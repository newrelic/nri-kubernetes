{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels: {{ include "newrelic.labels" . | indent 4 }}
  name: {{ template "newrelic.fullname" . }}
rules:
  - apiGroups: [""]
    resources:
      - "nodes"
      - "nodes/metrics" # Allows /metrics and /metrics/cadvisor
      - "nodes/stats"   # Allows /stats/summary
      - "nodes/proxy"
      - "nodes/pods"     # Allows /pods
      - "nodes/healthz"  # Allows /healthz (used for connection testing)
      - "pods"
      - "services"
    verbs: ["get", "list"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
{{- if .Values.rbac.pspEnabled }}
  - apiGroups:
      - extensions
    resources:
      - podsecuritypolicies
    resourceNames:
      - privileged-{{ template "newrelic.fullname" . }}
    verbs:
      - use
{{- end -}}
{{- if or (.Values.etcdTlsSecretName) (.Values.etcdTlsSecretNamespace)}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels: {{ include "newrelic.labels" . | indent 4 }}
  name: {{ template "newrelic.fullname" . }}-secrets
rules:
  - apiGroups: [""]
    resources:
      - "secrets"
    verbs: ["get", "list"]
{{- end -}}
{{- end -}}

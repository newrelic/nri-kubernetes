# These metrics are not present on 1.31 or KSM < 2.14
except_metrics: [
  # pod-level resource settings are only possible in versions >=1.34
  "k8s.pod.cpuRequestedCores",
  "k8s.pod.cpuLimitCores",
  "k8s.pod.memoryRequestedBytes",
  "k8s.pod.memoryLimitBytes",
  "k8s.pod.requestedCpuCoresUtilization",
  "k8s.pod.cpuCoresUtilization",
  "k8s.pod.requestedMemoryUtilization",
  "k8s.pod.memoryUtilization"
]
